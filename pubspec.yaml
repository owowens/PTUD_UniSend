name: unisend
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.0.0
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  flutter_svg: ^2.2.4
  google_fonts: ^8.0.2
  image_picker: ^1.2.0
  geolocator: ^10.1.0
  provider: ^6.1.0
  http: ^1.1.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  url_launcher: ^6.3.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - UniSend_icon.png
    - maZL.jpg

# Enable Material 3 in app code by setting `useMaterial3: true` in MaterialApp

flutter_launcher_icons:
  android: true
  ios: true
  image_path: UniSend_icon.png
